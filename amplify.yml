version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --include=dev --include=optional --legacy-peer-deps
    build:
      commands:
        - NEXT_PUBLIC_GA_MEASUREMENT_ID=${NEXT_PUBLIC_GA_MEASUREMENT_ID:-G-MN7H9XRCNS} npm run build
        - if [ -d "${LANCEDB_PATH:-/tmp/lancedb-pristine}/supplements.lance" ]; then npx tsx scripts/add-vitamin-b-complex-to-lancedb.ts; else echo "Skipping LanceDB Vitamin B update; local table not present"; fi
        - if [ -d "${LANCEDB_PATH:-/tmp/lancedb-pristine}/supplements.lance" ]; then npx tsx scripts/add-vitamins-c-d-to-lancedb.ts; else echo "Skipping LanceDB Vitamin C/D update; local table not present"; fi
        - rm -rf .next/cache
        - rm -rf amplify-artifact
        - mkdir -p amplify-artifact
        - cp -R .next/. amplify-artifact/
        - rm -rf amplify-artifact/cache
        - rm -rf node_modules
  artifacts:
    baseDirectory: amplify-artifact
    files:
      - '**/*'
